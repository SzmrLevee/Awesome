services:
  app:
    build: .
    image: ${COMPOSE_PROJECT_NAME:-django}-image
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: ./a_core/.env.example
        required: false
      - path: ./a_core/.env
        required: false
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    volumes:
      - redis_data:/data

  celery:
    build: .
    image: ${COMPOSE_PROJECT_NAME:-django}-image
    command: celery --app=a_core worker -E -l info
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: ./a_core/.env.example
        required: false
      - path: ./a_core/.env
        required: false
    depends_on:
      - postgres
      - redis
      - app

  flower:
    build: .
    image: ${COMPOSE_PROJECT_NAME:-django}-image
    command: sh -c "sleep 10 && celery --app=a_core flower --basic_auth=admin:root_p_ssW0rd"
    ports:
      - "5555:5555"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: ./a_core/.env.example
        required: false
      - path: ./a_core/.env
        required: false
    depends_on:
      - redis

  beat:
    build: .
    image: ${COMPOSE_PROJECT_NAME:-django}-image
    command: sh -c "sleep 10 && celery -A a_core beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler"
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
    env_file:
      - path: ./a_core/.env.example
        required: false
      - path: ./a_core/.env
        required: false
    depends_on:
      - redis
      - app

volumes:
  postgres_data:
  redis_data: