{% extends 'layouts/b.html' %}

{% block content %}

<h1 class="text-3xl font-bold mb-4">Edit Post</h1>
<div class="card post-edit-card !p-4">
    <div class="flex items-center mb-4">
        <img class="post-edit-image rounded-xl" src="{{ post.image }}">
        <h3 class="text-lg font-bold">{{ post.title }}</h3>
    </div>
    
    <div class="pb-2">
        <form method='POST'>
            {% csrf_token %}

            {{ form.body }}
            {{ form.body.errors }}

            <div class="category-row mt-4 mb-6">
                {{ form.tags.label_tag }}
                <div class="post-category-options flex flex-wrap gap-3 pt-1">
                    {% for checkbox in form.tags %}
                        <label class="post-category-pill">
                            {{ checkbox.tag }}
                            <span class="inline-flex min-h-9 select-none items-center rounded-full border border-gray-200 bg-white px-4 text-sm font-semibold text-gray-800 shadow-sm peer-checked:border-gray-800 peer-checked:bg-gray-800 peer-checked:text-white">{{ checkbox.choice_label }}</span>
                        </label>
                    {% endfor %}
                </div>
            </div>
            {{ form.tags.errors }}

            <div class="pt-1">
                <button type="submit" class="button">Submit</button>
                <a class="button secondaryAction ml-1" href="{{ request.META.HTTP_REFERER }}">Go Back</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
